<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — USDT Sender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .auth-wrap {
      min-height: 100vh; display: flex;
      align-items: flex-start; justify-content: center; padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem 2rem;
      width: 100%; max-width: 480px; box-shadow: var(--shadow-lg);
    }
    .auth-logo {
      width: 48px; height: 48px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 700; color: #fff;
      margin: 0 auto 1.5rem; box-shadow: 0 0 24px var(--accent-glow);
    }
    .auth-title { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    .auth-sub   { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.4rem; }
    .form-group input, .form-group select {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 0.95rem; font-family: inherit; transition: var(--transition);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light);
    }
    .form-group select option { background: var(--bg-secondary); }
    .plan-preview {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.75rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.2rem;
    }
    .plan-preview .usdt-amount { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .plan-preview .btc-price   { font-size: 0.9rem; color: var(--gold); font-weight: 600; }
    .btn-submit {
      width: 100%; padding: 0.85rem;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: var(--transition); margin-top: 0.5rem;
    }
    .btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error {
      background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.3);
      color: #e74c3c; border-radius: var(--radius-sm); padding: 0.75rem 1rem;
      font-size: 0.875rem; margin-bottom: 1rem; display: none;
    }
    /* Payment step */
    .payment-step { display: none; }
    .payment-box {
      background: var(--bg-input); border: 1px solid var(--accent);
      border-radius: var(--radius); padding: 1.5rem; text-align: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .payment-box h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .payment-box .amount-due {
      font-size: 2rem; font-weight: 700; color: var(--gold); margin: 0.75rem 0;
    }
    .btc-addr-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .btc-addr {
      font-family: monospace; font-size: 0.8rem; color: var(--text-primary);
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.6rem 0.8rem;
      word-break: break-all; cursor: pointer; transition: var(--transition);
      margin-bottom: 0.4rem;
    }
    .btc-addr:hover { border-color: var(--accent); }
    .copy-hint { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem; }
    .payment-ref {
      font-size: 0.8rem; color: var(--text-secondary);
      background: var(--bg-secondary); border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem; margin-bottom: 1rem; font-family: monospace;
    }
    .status-row {
      display: flex; align-items: center; gap: 0.5rem;
      justify-content: center; font-size: 0.875rem; color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--warning);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.approved { background: var(--accent); animation: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-approved {
      background: rgba(38,161,123,0.12); border: 1px solid var(--accent);
      border-radius: var(--radius-sm); padding: 1rem; text-align: center;
      color: var(--accent); font-weight: 600; margin-top: 1rem; display: none;
    }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">$</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Get your USDT account in minutes</p>

      <div class="auth-error" id="error-msg"></div>

      <!-- STEP 1: Registration form -->
      <div id="register-step">
        <form id="register-form">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" required />
          </div>
          <div class="form-group">
            <label for="plan">Choose your plan</label>
            <select id="plan" required>
              <option value="">— Select a plan —</option>
              <option value="10k">10,000 USDT — $100 BTC</option>
              <option value="500k">500,000 USDT — $500 BTC</option>
              <option value="1m">1,000,000 USDT — $1,000 BTC</option>
            </select>
          </div>

          <div class="plan-preview" id="plan-preview" style="display:none">
            <span class="usdt-amount" id="preview-usdt">—</span>
            <span class="btc-price"  id="preview-price">—</span>
          </div>

          <div class="form-group">
            <label for="tron">TRON address (T...) — to receive your USDT</label>
            <input type="text" id="tron" placeholder="T..." />
          </div>

          <button type="submit" class="btn-submit" id="submit-btn">Create Account &amp; Pay</button>
        </form>
      </div>

      <!-- STEP 2: Payment instructions -->
      <div class="payment-step" id="payment-step">
        <div class="payment-box">
          <h3>Send BTC to complete registration</h3>
          <div class="amount-due" id="pay-amount">$100</div>
          <div class="btc-addr-label">Send exactly to this Bitcoin address:</div>
          <div class="btc-addr" id="btc-address" onclick="copyAddress(this)">loading...</div>
          <div class="copy-hint">Click address to copy</div>
          <div class="payment-ref">Ref: <span id="pay-ref">—</span></div>
          <div class="status-row">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Waiting for admin approval...</span>
          </div>
          <div class="status-approved" id="approved-banner">
            ✅ Account approved! <a href="/index.html">Open USDT Sender →</a>
          </div>
        </div>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/tracker.js?v=26"></script>
  <script>
    var pollInterval = null;

    const PLANS = {
      '10k':  { usdt: '10,000 USDT',   price: '$100' },
      '500k': { usdt: '500,000 USDT',  price: '$500' },
      '1m':   { usdt: '1,000,000 USDT', price: '$1,000' },
    };

    // Pre-select plan from URL
    const urlPlan = new URLSearchParams(location.search).get('plan');
    if (urlPlan && PLANS[urlPlan]) {
      document.getElementById('plan').value = urlPlan;
      updatePreview(urlPlan);
    }

    // Check if returning with pending status
    const urlStatus = new URLSearchParams(location.search).get('status');
    if (urlStatus === 'pending') {
      const savedUser = JSON.parse(localStorage.getItem('usdt_user') || 'null');
      if (savedUser) showPaymentStep(savedUser);
    }

    document.getElementById('plan').addEventListener('change', function () {
      updatePreview(this.value);
    });

    function updatePreview(plan) {
      const preview = document.getElementById('plan-preview');
      if (!plan || !PLANS[plan]) { preview.style.display = 'none'; return; }
      document.getElementById('preview-usdt').textContent  = PLANS[plan].usdt;
      document.getElementById('preview-price').textContent = PLANS[plan].price;
      preview.style.display = 'flex';
    }

    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn     = document.getElementById('submit-btn');
      const errEl   = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const body = {
        email:       document.getElementById('email').value.trim(),
        password:    document.getElementById('password').value,
        accountType: document.getElementById('plan').value,
        tronAddress: document.getElementById('tron').value.trim(),
      };

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');

        localStorage.setItem('usdt_jwt',  data.token);
        localStorage.setItem('usdt_user', JSON.stringify(data.user));
        if (window.USDTTracker) {
          window.USDTTracker.trackAuth('register_success', body.email || 'unknown');
        }
        showPaymentStep(data.user);

      } catch (err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'block';
        if (window.USDTTracker) {
          window.USDTTracker.trackAuth('register_failed', err.message || 'Registration failed');
        }
        btn.disabled        = false;
        btn.textContent     = 'Create Account & Pay';
      }
    });

    function showPaymentStep(user) {
      document.getElementById('register-step').style.display = 'none';
      document.getElementById('payment-step').style.display  = 'block';
      document.getElementById('btc-address').textContent = user.btcAddress;
      document.getElementById('pay-amount').textContent  = '$' + user.btcAmount;
      document.getElementById('pay-ref').textContent     = user.paymentRef || '—';
      startPolling();
    }

    function copyAddress(el) {
      navigator.clipboard.writeText(el.textContent).then(() => {
        el.style.borderColor = 'var(--accent)';
        setTimeout(() => el.style.borderColor = '', 1200);
      });
    }

    function startPolling() {
      pollInterval = setInterval(checkStatus, 5000);
    }

    async function checkStatus() {
      const token = localStorage.getItem('usdt_jwt');
      if (!token) return;
      try {
        const res  = await fetch('/api/admin/status', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (data.status === 'approved') {
          clearInterval(pollInterval);
          document.getElementById('status-dot').classList.add('approved');
          document.getElementById('status-text').textContent = 'Account approved!';
          document.getElementById('approved-banner').style.display = 'block';
          localStorage.setItem('usdt_user', JSON.stringify(data));
        } else if (data.status === 'rejected') {
          clearInterval(pollInterval);
          document.getElementById('status-text').textContent = '❌ Account rejected by admin.';
        }
      } catch {}
    }
  </script>
</body>
</html>
