<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — USDT Sender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .auth-wrap {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .auth-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem 2rem;
      width: 100%; max-width: 420px; box-shadow: var(--shadow-lg);
    }
    .auth-logo {
      width: 48px; height: 48px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 700; color: #fff;
      margin: 0 auto 1.5rem; box-shadow: 0 0 24px var(--accent-glow);
    }
    .auth-title { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    .auth-sub { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.4rem; }
    .form-group input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 0.95rem; font-family: inherit; transition: var(--transition);
    }
    .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .btn-submit {
      width: 100%; padding: 0.85rem;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: var(--transition); margin-top: 0.5rem;
    }
    .btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error {
      background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.3);
      color: #e74c3c; border-radius: var(--radius-sm); padding: 0.75rem 1rem;
      font-size: 0.875rem; margin-bottom: 1rem; display: none;
    }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { color: var(--accent-hover); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">$</div>
      <h1 class="auth-title">Sign In</h1>
      <p class="auth-sub">Access your USDT account</p>

      <div class="auth-error" id="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/landing.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/tracker.js?v=26"></script>
  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('usdt_jwt');
    if (token) {
      fetch('/api/admin/status', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.ok ? window.location.href = '/index.html' : null)
        .catch(() => {});
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn     = document.getElementById('submit-btn');
      const errEl   = document.getElementById('error-msg');
      const email   = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('usdt_jwt',  data.token);
        localStorage.setItem('usdt_user', JSON.stringify(data.user));
        if (window.USDTTracker) {
          window.USDTTracker.trackAuth('login_success', email);
        }

        window.location.href = data.user.status === 'approved' ? '/index.html' : '/register.html?status=pending';

      } catch (err) {
        errEl.textContent    = err.message;
        errEl.style.display  = 'block';
        if (window.USDTTracker) {
          window.USDTTracker.trackAuth('login_failed', err.message || 'Login failed');
        }
        btn.disabled         = false;
        btn.textContent      = 'Sign In';
      }
    });
  </script>
</body>
</html>
